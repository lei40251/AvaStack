listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
# 降低 Hybrid 等周期性状态日志的打印频率，避免控制台被心跳日志刷屏。
pithy_print_ms      60000;
http_api {
    enabled         on;
    listen          1985;
}
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}
rtc_server {
    enabled on;
    listen 8000;
}
vhost __defaultVhost__ {
    rtc {
        enabled on;
    }
}

